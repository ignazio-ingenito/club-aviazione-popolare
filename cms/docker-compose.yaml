      DB_PORT: "5432"
      DB_DATABASE: "neondb"
      DB_USER: "neondb_owner"
      DB_PASSWORD: "npg_vZMNOR4hq6xW"
      DB_SSL: "true"

      CACHE_ENABLED: "true"
      CACHE_AUTO_PURGE: "true"
      CACHE_STORE: "redis"
      REDIS: "redis://cache:6379"

