services:
  cache:
    image: redis
    container_name: redis
    healthcheck:
      test: ["CMD-SHELL", "[ $$(redis-cli ping) = 'PONG' ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      # start_interval: 5s
      # start_period: 30s

  directus:
    image: directus/directus
    container_name: directus
    cap_add:
      - NET_RAW
    ports:
      - 8055:8055
    volumes:
      - ./uploads:/directus/uploads
      - ./extensions:/directus/extensions
    depends_on:
      cache:
        condition: service_healthy
    environment:
      SECRET: "Nutshell-Suspense-Domestic6"
