name: Retag Corrected Images

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OLD_IMAGE_WEB: ignazio-ingenito/club-avizione-popolare-web
  OLD_IMAGE_CMS: ignazio-ingenito/club-avizione-popolare-cms
  NEW_IMAGE_WEB: ignazio-ingenito/club-aviazione-popolare-web
  NEW_IMAGE_CMS: ignazio-ingenito/club-aviazione-popolare-cms

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy latest tags to corrected package names
        run: |
          docker buildx imagetools create \
            -t "${REGISTRY}/${NEW_IMAGE_WEB}:latest" \
            "${REGISTRY}/${OLD_IMAGE_WEB}:latest"
          docker buildx imagetools create \
            -t "${REGISTRY}/${NEW_IMAGE_CMS}:latest" \
            "${REGISTRY}/${OLD_IMAGE_CMS}:latest"
