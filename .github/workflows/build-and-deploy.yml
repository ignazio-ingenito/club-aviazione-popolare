name: Build and Publish Images

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_WEB: ${{ github.repository }}-web
  IMAGE_CMS: ${{ github.repository }}-cms

jobs:
  web:
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.out.outputs.image_sha }}
      image_latest: ${{ steps.out.outputs.image_latest }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (web)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build (web)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Outputs (web)
        id: out
        run: |
          echo "image_sha=${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}:latest" >> "$GITHUB_OUTPUT"

  cms:
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.out.outputs.image_sha }}
      image_latest: ${{ steps.out.outputs.image_latest }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (cms)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_CMS }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build (cms)
        uses: docker/build-push-action@v7
        with:
          context: ./cms
          file: ./cms/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Outputs (cms)
        id: out
        run: |
          echo "image_sha=${{ env.REGISTRY }}/${{ env.IMAGE_CMS }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ env.REGISTRY }}/${{ env.IMAGE_CMS }}:latest" >> "$GITHUB_OUTPUT"
